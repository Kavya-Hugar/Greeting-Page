<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="greeting-card">
            <label for="nameInput" class="name-label">Enter Your Name</label>
            <input 
                type="text" 
                id="nameInput" 
                placeholder="Type your name here" 
                class="name-input"
                autocomplete="off"
            >
            <button id="greetBtn" class="greet-button">Greet</button>
            <div id="greetingMessage" class="greeting-message"></div>
        </div>
    </div>
    
    <!-- Animation containers -->
    <div id="confettiContainer" class="animation-container"></div>
    <div id="partyPopperContainer" class="animation-container"></div>
    <div id="glowingBurstContainer" class="animation-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
